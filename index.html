<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXLEDS — LED Step Light 360°</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #080606;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff;
    touch-action: none;
  }

  #app {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── 背景：从产品炭黑+暗红台座提取 ── */
  #bg {
    position: absolute; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 100% 70% at 50% 55%,
      #201414 0%,
      #160d0d 28%,
      #0e0808 55%,
      #080505 100%
    );
  }
  /* 台座红色环境反光 */
  #bg::before {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 75%; height: 42%;
    background: radial-gradient(ellipse at 50% 100%,
      rgba(150,18,18,0.22) 0%,
      rgba(100,10,10,0.09) 45%,
      transparent 70%
    );
  }
  /* LED 暖金色光晕 */
  #bg::after {
    content: '';
    position: absolute;
    top: 25%; left: 50%; transform: translateX(-50%);
    width: 55%; height: 35%;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(185,115,10,0.07) 0%,
      transparent 65%
    );
  }

  /* ── 巨型底纹字 ── */
  #bg-word {
    position: absolute; z-index: 1;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(68px, 15vw, 200px);
    font-weight: 900;
    letter-spacing: -0.01em;
    white-space: nowrap;
    color: #fff;
    opacity: 0.038;
    -webkit-text-stroke: 1.5px rgba(255,255,255,0.04);
    user-select: none; pointer-events: none;
  }

  /* ── 顶部 Logo ── */
  #header {
    position: absolute; z-index: 10;
    top: clamp(18px, 3vh, 34px);
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center;
  }
  .l-nex  { color: #c0231b; font-size: 17px; font-weight: 800; letter-spacing: 0.03em; }
  .l-leds { color: rgba(255,255,255,0.88); font-size: 17px; font-weight: 700; letter-spacing: 0.05em; }
  .l-sep  { width: 1px; height: 13px; background: rgba(255,255,255,0.15); margin: 0 11px; }
  .l-sub  { font-size: 10px; font-weight: 400; letter-spacing: 0.18em; color: rgba(255,255,255,0.28); text-transform: uppercase; }

  /* ── Canvas 展示区 ──
     关键：宽高比设为 16:9（横宽），保证侧角旋转时产品不被裁切
     最大宽度 960px，手机端占 98vw
  ── */
  #stage {
    position: relative; z-index: 5;
    width: 100%;
    display: flex; justify-content: center; align-items: center;
  }

  #canvas-wrap {
    position: relative;
    width: min(960px, 98vw);
    /* 桌面 16:9，手机改为近正方形 */
    aspect-ratio: 16 / 9;
    max-height: 60vh;
    cursor: grab;
  }
  #canvas-wrap:active { cursor: grabbing; }

  @media (max-width: 600px) {
    #canvas-wrap {
      width: 100vw;
      aspect-ratio: 1 / 1;
      max-height: 70vw;
    }
  }

  /* 底部投影光晕 */
  #canvas-wrap::after {
    content: '';
    position: absolute;
    bottom: -8%; left: 20%; right: 20%;
    height: 15%;
    background: radial-gradient(ellipse at 50% 0%,
      rgba(120,14,14,0.28) 0%, transparent 70%
    );
    pointer-events: none;
    filter: blur(10px);
  }

  #main-canvas {
    display: block;
    width: 100%; height: 100%;
  }

  /* ── 右侧认证徽章 ── */
  #badges {
    position: absolute; z-index: 10;
    right: clamp(12px, 2.5vw, 38px);
    top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 16px; align-items: center;
  }
  .badge { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.38; transition: opacity 0.3s; }
  .badge:hover { opacity: 0.72; }
  .badge-c {
    width: 30px; height: 30px;
    border: 1px solid rgba(255,255,255,0.17); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.72); letter-spacing: 0.03em;
  }
  .badge-t { font-size: 7px; letter-spacing: 0.08em; color: rgba(255,255,255,0.26); text-transform: uppercase; text-align: center; line-height: 1.4; }

  /* ── 左侧型号竖排 ── */
  #model-tag {
    position: absolute; z-index: 10;
    left: clamp(12px, 2.5vw, 38px);
    top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .mv {
    font-size: 9px; font-weight: 500; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.20); text-transform: uppercase;
    writing-mode: vertical-rl; transform: rotate(180deg); line-height: 1;
  }
  .mv b { color: rgba(255,255,255,0.48); font-weight: 600; }

  /* ── 拖拽提示 ── */
  #drag-hint {
    position: absolute; z-index: 10;
    bottom: clamp(52px, 8vh, 80px);
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    opacity: 1; transition: opacity 1.4s ease; pointer-events: none;
  }
  #drag-hint.hidden { opacity: 0; }
  .h-arr {
    width: 15px; height: 15px;
    border-top: 1.5px solid rgba(255,255,255,0.32);
    border-right: 1.5px solid rgba(255,255,255,0.32);
    animation: pulse 1.9s ease-in-out infinite;
  }
  .h-arr.l { transform: rotate(-135deg); animation-delay: 0.2s; }
  .h-arr.r { transform: rotate(45deg); }
  @keyframes pulse { 0%,100%{opacity:0.28} 50%{opacity:0.68} }
  .h-txt { font-size: 10px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.26); }

  /* ── 底部参数栏 ── */
  #info-bar {
    position: absolute; z-index: 10;
    bottom: clamp(14px, 2vh, 24px);
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center;
    gap: clamp(12px, 2.2vw, 34px); white-space: nowrap;
  }
  .ii { text-align: center; }
  .ii-l { font-size: clamp(8px, 0.95vw, 10px); font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.26); margin-bottom: 3px; }
  .ii-v { font-size: clamp(10px, 1.25vw, 13px); font-weight: 600; letter-spacing: 0.06em; color: rgba(255,255,255,0.68); }
  .idiv { width: 1px; height: 24px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
  .cct  { display: flex; align-items: center; gap: 5px; margin-top: 3px; justify-content: center; }
  .cct span { width: 7px; height: 7px; border-radius: 50%; }
  .c3k { background: #ffb347; }
  .c4k { background: #fff2c0; }
  .c5k { background: #ddf2ff; }

  /* ── 加载遮罩 ── */
  #loader {
    position: absolute; inset: 0; z-index: 100;
    background: #080606;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 26px;
    transition: opacity 0.9s ease;
  }
  #loader.out { opacity: 0; pointer-events: none; }
  .ld-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.32em; color: rgba(255,255,255,0.40); text-transform: uppercase; }
  .ld-logo em { color: #c0231b; font-style: normal; }
  .ld-track { width: min(200px, 52vw); height: 1px; background: rgba(255,255,255,0.07); border-radius: 1px; overflow: hidden; }
  .ld-fill  { height: 100%; width: 0%; border-radius: 1px; background: linear-gradient(90deg, #8b1818, #c08010); transition: width 0.12s ease; }
  .ld-pct   { font-size: 10.5px; font-weight: 500; letter-spacing: 0.14em; color: rgba(255,255,255,0.22); }

  /* ── 缩放控件 ── */
  #zoom-controls {
    position: absolute; z-index: 10;
    bottom: clamp(52px, 8vh, 80px);
    right: clamp(12px, 2.5vw, 38px);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.65);
    font-size: 18px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .zoom-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); }
  .zoom-btn:active { background: rgba(255,255,255,0.22); }
  #zoom-pct {
    font-size: 9px; font-weight: 500; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.26); text-align: center;
    min-width: 32px;
  }
  .zoom-btn-reset {
    width: 32px; height: 20px;
    border-radius: 10px;
    font-size: 8px; letter-spacing: 0.1em; font-weight: 600;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    #badges, #model-tag { display: none; }
    #info-bar { gap: 8px; }
    #zoom-controls { right: 8px; bottom: clamp(56px, 10vh, 90px); }
    #stage { align-items: center; justify-content: center; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="bg"></div>
  <div id="bg-word" aria-hidden="true">STEP LIGHT</div>

  <div id="header">
    <span class="l-nex">NEX</span><span class="l-leds">LEDS®</span>
    <div class="l-sep"></div>
    <span class="l-sub">LED Step Light · Drag to Explore</span>
  </div>

  <div id="model-tag" aria-label="Product model">
    <span class="mv"><b>NX-2SL</b>-241W</span>
    <span class="mv">3CCT · ETL</span>
  </div>

  <div id="stage">
    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
    </div>
  </div>

  <div id="badges" aria-label="Certifications">
    <div class="badge"><div class="badge-c">ETL</div><div class="badge-t">Certified</div></div>
    <div class="badge"><div class="badge-c">IP65</div><div class="badge-t">Wet<br>Rated</div></div>
    <div class="badge"><div class="badge-c">5YR</div><div class="badge-t">Warranty</div></div>
    <div class="badge"><div class="badge-c">DIM</div><div class="badge-t">Dimmable</div></div>
  </div>

  <div id="drag-hint" aria-hidden="true">
    <div class="h-arr l"></div>
    <span class="h-txt">Drag to rotate</span>
    <div class="h-arr r"></div>
  </div>

  <div id="zoom-controls" aria-label="Zoom controls">
    <button class="zoom-btn" id="zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
    <div id="zoom-pct">100%</div>
    <button class="zoom-btn" id="zoom-out" title="Zoom out" aria-label="Zoom out">−</button>
    <button class="zoom-btn zoom-btn-reset" id="zoom-reset" title="Reset zoom" aria-label="Reset zoom">RST</button>
  </div>

  <div id="info-bar">
    <div class="ii"><div class="ii-l">Power</div><div class="ii-v">2.4 W</div></div>
    <div class="idiv"></div>
    <div class="ii">
      <div class="ii-l">CCT</div>
      <div class="cct"><span class="c3k"></span><span class="c4k"></span><span class="c5k"></span></div>
    </div>
    <div class="idiv"></div>
    <div class="ii"><div class="ii-l">Voltage</div><div class="ii-v">120 V</div></div>
    <div class="idiv"></div>
    <div class="ii"><div class="ii-l">Beam</div><div class="ii-v">180°</div></div>
    <div class="idiv"></div>
    <div class="ii"><div class="ii-l">Finish</div><div class="ii-v">BK / WH</div></div>
  </div>

  <div id="loader" role="status" aria-live="polite">
    <div class="ld-logo"><em>NEX</em>LEDS — LED Step Light</div>
    <div class="ld-track"><div class="ld-fill" id="ld-fill"></div></div>
    <div class="ld-pct" id="ld-pct">Loading · 0%</div>
  </div>

</div>

<script>
(function () {
  'use strict';

  /* ── 配置 ── */
  const TOTAL = 90;
  const DIR   = './images/';
  const SENS  = 0.28;   /* 拖拽灵敏度 */
  const DAMP  = 0.87;   /* 惯性阻尼 */
  const MOMT  = 0.58;   /* 松手惯性倍率 */

  /* ── DOM ── */
  const canvas = document.getElementById('main-canvas');
  const ctx    = canvas.getContext('2d');
  const loader = document.getElementById('loader');
  const ldFill = document.getElementById('ld-fill');
  const ldPct  = document.getElementById('ld-pct');
  const hint   = document.getElementById('drag-hint');
  const wrap   = document.getElementById('canvas-wrap');

  /* ── 状态 ── */
  const frames   = new Array(TOTAL);
  let curF       = 0;
  let tgtF       = 0;
  let vel        = 0;
  let dragging   = false;
  let lastX      = 0, lastT = 0;
  let interacted = false;
  let autoTimer  = null;
  let loaded     = 0;

  /* ── 缩放状态 ── */
  const ZOOM_MIN  = 0.6;
  const ZOOM_MAX  = 3.5;
  const ZOOM_STEP = 0.25;
  let zoom        = 1.0;   /* 裁掉空白后产品自动填满画布 */
  let panX        = 0;
  let panY        = 0;
  let pinchDist0  = null;
  let pinchZoom0  = 1;

  const zoomIn    = document.getElementById('zoom-in');
  const zoomOut   = document.getElementById('zoom-out');
  const zoomReset = document.getElementById('zoom-reset');
  const zoomPct   = document.getElementById('zoom-pct');

  function clampZoom(z) { return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)); }
  function updateZoomUI() { zoomPct.textContent = Math.round(zoom * 100) + '%'; }

  /* ── Canvas 分辨率（Retina 适配） ── */
  function resize() {
    const dpr  = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.round(rect.width  * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    paint(Math.round(curF));
  }

  /* ── 图像边界：扫描所有帧取联合最大范围，确保各角度产品位置一致 ── */
  const boundsCache = new Array(TOTAL);
  let unifiedBounds = null;   /* 所有帧的联合边界，计算完成后统一使用 */
  let boundsReady   = 0;      /* 已完成边界计算的帧数 */

  function getProductBounds(img) {
    const s  = 0.2;
    const sw = Math.round(img.naturalWidth  * s);
    const sh = Math.round(img.naturalHeight * s);
    const oc = document.createElement('canvas');
    oc.width = sw; oc.height = sh;
    const ox = oc.getContext('2d');
    ox.drawImage(img, 0, 0, sw, sh);
    const data = ox.getImageData(0, 0, sw, sh).data;

    let minX = sw, minY = sh, maxX = 0, maxY = 0;
    const ALPHA_THRESH = 12;
    for (let y = 0; y < sh; y++) {
      for (let x = 0; x < sw; x++) {
        if (data[(y * sw + x) * 4 + 3] > ALPHA_THRESH) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
    if (maxX <= minX || maxY <= minY) return null;
    return {
      x1: minX / s, y1: minY / s,
      x2: maxX / s, y2: maxY / s
    };
  }

  function computeUnified() {
    let x1 = Infinity, y1 = Infinity, x2 = 0, y2 = 0;
    for (let i = 0; i < TOTAL; i++) {
      const b = boundsCache[i];
      if (!b) continue;
      if (b.x1 < x1) x1 = b.x1;
      if (b.y1 < y1) y1 = b.y1;
      if (b.x2 > x2) x2 = b.x2;
      if (b.y2 > y2) y2 = b.y2;
    }
    if (x2 <= x1 || y2 <= y1) return;
    const W   = frames[0].naturalWidth;
    const H   = frames[0].naturalHeight;
    const pad = 0.05;
    const bw  = x2 - x1, bh = y2 - y1;
    const px  = bw * pad, py = bh * pad;
    unifiedBounds = {
      sx: Math.max(0, x1 - px),
      sy: Math.max(0, y1 - py),
      sw: Math.min(W, bw + px * 2),
      sh: Math.min(H, bh + py * 2)
    };
  }

  /* ── 绘制：使用联合边界（统一居中） + 缩放平移 ── */
  function paint(idx) {
    idx = ((idx % TOTAL) + TOTAL) % TOTAL;
    const img = frames[idx];
    if (!img || !img.complete || !img.naturalWidth) return;

    const dpr = window.devicePixelRatio || 1;
    const cw  = canvas.width  / dpr;
    const ch  = canvas.height / dpr;

    ctx.clearRect(0, 0, cw, ch);

    /* 计算当前帧边界（异步积累） */
    if (!boundsCache[idx]) {
      const b = getProductBounds(img);
      if (b) { boundsCache[idx] = b; boundsReady++; }
      /* 每隔几帧或全部完成时重算联合边界 */
      if (boundsReady % 10 === 0 || boundsReady === TOTAL) computeUnified();
    }

    /* 用联合边界或降级到全图 */
    const b = unifiedBounds || { sx: 0, sy: 0, sw: img.naturalWidth, sh: img.naturalHeight };

    const baseScale = Math.min(cw / b.sw, ch / b.sh);
    const scale     = baseScale * zoom;
    const dw        = b.sw * scale;
    const dh        = b.sh * scale;
    const dx        = (cw - dw) / 2 + panX;
    const dy        = (ch - dh) / 2 + panY;

    ctx.drawImage(img, b.sx, b.sy, b.sw, b.sh, dx, dy, dw, dh);
  }

  /* ── 动画主循环 ── */
  function loop() {
    requestAnimationFrame(loop);
    if (!dragging) {
      vel *= DAMP;
      if (zoom <= 1.01) tgtF += vel;
    }
    curF += (tgtF - curF) * 0.16;
    paint(Math.round(curF));
  }

  /* ── 自动旋转（首次交互前） ── */
  function startAuto() {
    let t = 0;
    autoTimer = setInterval(function () {
      if (interacted) { clearInterval(autoTimer); return; }
      t += 0.013;
      tgtF = t * TOTAL;
    }, 16);
  }

  /* ── 加载序列帧 ── */
  function load() {
    for (let i = 0; i < TOTAL; i++) {
      const img = new Image();
      img.src = DIR + 'Desktop' + String(i).padStart(3, '0') + '.png';
      img.onload = img.onerror = onLoad;
      frames[i] = img;
    }
  }

  function onLoad() {
    loaded++;
    const pct = Math.round(loaded / TOTAL * 100);
    ldFill.style.width = pct + '%';
    ldPct.textContent  = 'Loading · ' + pct + '%';

    if (loaded === 1) { resize(); paint(0); }

    if (loaded === TOTAL) {
      paint(0);
      setTimeout(function () {
        loader.classList.add('out');
        setTimeout(function () { loader.style.display = 'none'; }, 950);
      }, 300);
      loop();
      startAuto();
    }
  }

  /* ── Pointer 事件（鼠标 + 触控统一） ── */
  let lastY = 0;
  canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    dragging = true; vel = 0;
    lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
    canvas.setPointerCapture(e.pointerId);
    if (!interacted) {
      interacted = true;
      hint.classList.add('hidden');
      clearInterval(autoTimer);
    }
  }, { passive: false });

  canvas.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    e.preventDefault();
    const now = performance.now();
    const dt  = Math.max(now - lastT, 1);
    const dx  = e.clientX - lastX;
    const dy  = e.clientY - lastY;

    if (zoom > 1.01) {
      panX += dx;
      panY += dy;
      panX  = Math.max(-400, Math.min(400, panX));
      panY  = Math.max(-300, Math.min(300, panY));
    } else {
      vel   = (dx / wrap.offsetWidth) * TOTAL * MOMT * (16 / dt);
      tgtF -= dx * SENS;
    }
    lastX = e.clientX; lastY = e.clientY; lastT = now;
  }, { passive: false });

  const endDrag = () => { dragging = false; };
  canvas.addEventListener('pointerup',     endDrag);
  canvas.addEventListener('pointercancel', endDrag);

  /* ── 双指捏合缩放 ── */
  canvas.addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) {
      pinchDist0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      pinchZoom0 = zoom;
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', function (e) {
    if (e.touches.length === 2 && pinchDist0 !== null) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      zoom = clampZoom(pinchZoom0 * (dist / pinchDist0));
      if (zoom <= ZOOM_MIN) panX = 0;
      updateZoomUI();
    } else {
      e.preventDefault();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function () { pinchDist0 = null; }, { passive: true });

  /* ── 滚轮缩放 ── */
  canvas.addEventListener('wheel', function (e) {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -ZOOM_STEP * 0.5 : ZOOM_STEP * 0.5;
    zoom = clampZoom(zoom + delta);
    if (zoom <= ZOOM_MIN) panX = panY = 0;
    updateZoomUI();
  }, { passive: false });

  /* ── 缩放按钮 ── */
  zoomIn.addEventListener('click', function () {
    zoom = clampZoom(zoom + ZOOM_STEP);
    updateZoomUI();
  });
  zoomOut.addEventListener('click', function () {
    zoom = clampZoom(zoom - ZOOM_STEP);
    if (zoom <= ZOOM_MIN) panX = panY = 0;
    updateZoomUI();
  });
  zoomReset.addEventListener('click', function () {
    zoom = 1.0; panX = 0; panY = 0;
    updateZoomUI();
  });

  document.addEventListener('touchmove', function (e) {
    if (e.target !== canvas) e.preventDefault();
  }, { passive: false });

  window.addEventListener('resize', function () {
    clearTimeout(resize._t);
    resize._t = setTimeout(resize, 100);
  });

  /* ── 启动 ── */
  updateZoomUI();
  resize();
  load();
})();
</script>
</body>
</html>
